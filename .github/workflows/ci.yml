name: CI

# Runs only on pull requests. The same test job is re-run inside the Deploy
# workflow on push to main, so we don't duplicate work or race ourselves.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

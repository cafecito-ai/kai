name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Don't run two deploys at once for the same branch — a slow Wrangler deploy
# would otherwise race a hotfix push. Cancel the older run in favor of newer.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build

  deploy-worker:
    needs: test
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Apply production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply kai-prod --remote --config wrangler.worker.toml
      # Wrangler reads CLOUDFLARE_API_TOKEN + CLOUDFLARE_ACCOUNT_ID from env.
      # Both must be configured as repo secrets:
      #   - CLOUDFLARE_API_TOKEN: token with Workers Scripts: Edit on the
      #     boost AI account. Same token used for `wrangler login` locally.
      #   - CLOUDFLARE_ACCOUNT_ID: f7a9b24f679e1d3952921ee5e72e677e (also
      #     hard-coded in wrangler.worker.toml; double-source for clarity).
      - name: Deploy Worker (kai-api)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run worker:deploy

      # Build the SPA so we can ship it to Pages.
      - name: Build SPA
        run: npm run build

      # Deploy the built SPA to Cloudflare Pages. The dashboard's GitHub
      # integration historically did this — it stopped picking up commits
      # on 2026-05-13 (the /scope route shipped via #69 never reached
      # production until a manual deploy), so we now own the deploy from
      # CI explicitly. wrangler.toml is a Pages-only config (Worker config
      # lives in wrangler.worker.toml), so this just works from the repo
      # root with no config-discovery surprises.
      - name: Deploy SPA to Pages (kai)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=kai \
            --branch=main \
            --commit-hash="${GITHUB_SHA}"

      # Allow a few seconds for the Worker route + Pages handoff to settle
      # before smoking.
      - name: Wait for propagation
        run: sleep 10

      - name: Post-deploy smoke
        env:
          KAI_PROD_URL: https://kai.boostaisearch.ai
        run: node scripts/smoke-deploy.mjs

      # Fast follow: if the smoke failed we should know in the Actions tab
      # and the deploy job goes red. No paging today; tracked as a follow-up
      # to add a Slack/email webhook when SAFETY_ALERT_EMAIL recipient lands.

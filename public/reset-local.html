<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>KAI local reset</title>
    <style>
      :root {
        color: #111116;
        background: #fafaf7;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(420px, 100%);
        border: 1px solid rgba(10, 10, 10, 0.08);
        border-radius: 28px;
        background: white;
        padding: 24px;
        box-shadow: 0 24px 70px rgba(10, 10, 10, 0.12);
      }
      p {
        margin: 8px 0 0;
        color: #6d6d73;
        line-height: 1.5;
        font-weight: 650;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        line-height: 1;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Resetting KAI.</h1>
      <p>Clearing local state and creating a fresh first-time dev user.</p>
    </main>
    <script>
      const freshUser = `local-first-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
      try {
        localStorage.clear();
        sessionStorage.clear();
        localStorage.setItem("kai.devUser", freshUser);
      } catch {
        // Keep redirecting; the app can still show onboarding if storage is blocked.
      }
      setTimeout(() => {
        window.location.replace(`/onboarding?fresh=${encodeURIComponent(freshUser)}`);
      }, 250);
    </script>
  </body>
</html>

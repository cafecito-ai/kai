# Cloudflare Pages config for the kai SPA.
#
# This is a Pages project (not a Worker). Pages reads `name` and
# `pages_build_output_dir`; the rest of the deploy config lives in the
# Cloudflare dashboard build settings, which must run:
#
#   Build command:  npm run build
#   Deploy command: npx wrangler pages deploy ./dist
#
# Earlier attempts used the Workers `[assets]` block — that's the right
# format for a Worker-with-assets project, NOT a Pages project. Cloudflare
# rejects Workers keys (`main`, `[assets]`, `account_id`, `[ai]`,
# `[[send_email]]`, etc.) on a Pages config; this file deliberately stays
# narrow.
#
# The backend Worker (kai-api) has its own config at wrangler.worker.toml.

name = "kai"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-11"

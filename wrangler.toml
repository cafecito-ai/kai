# Cloudflare deploy config for the KAI SPA.
#
# Uses the unified Workers + Assets format (replaces the older
# `pages_build_output_dir` Pages-only format). Vite builds the SPA into
# ./dist; Cloudflare serves those files as static assets directly from a
# Worker. No Worker code needed for the frontend deploy — `main` is
# intentionally omitted so wrangler treats this as an assets-only Worker.
#
# `not_found_handling = "single-page-application"` makes Cloudflare return
# index.html for any unknown route so client-side routing (react-router-dom)
# handles /home, /chat, /onboarding, /goals, /check-in, /journal, /sleep/log,
# /_design-tokens, /profile, /groups, /crisis, /demo, /scope without 404ing
# on hard reload.
#
# The backend Worker (kai-api) has its own config at wrangler.worker.toml.

name = "kai"
compatibility_date = "2026-05-11"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"

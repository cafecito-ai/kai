# Cloudflare Pages config for the kai SPA.
#
# The Worker (kai-api) has its own config at wrangler.worker.toml. Keep this
# file Pages-only — `wrangler pages deploy` refuses configs that mix in
# Worker keys (main / account_id / [ai] / [[send_email]] / etc.). Earlier
# versions of this file did mix the two, which forced the CI to deploy
# Pages from a temp dir; that hack is no longer needed once this file
# stays narrow.

name = "kai"
pages_build_output_dir = "dist"
compatibility_date = "2026-05-11"
